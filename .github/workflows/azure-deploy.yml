name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: trade-api-rg
  AZURE_LOCATION: eastasia
  ACR_NAME: tradeacr3633
  CONTAINER_APP_NAME: trade-api-backend
  STATIC_WEB_APP_NAME: trade-dashboard

jobs:
  # 偵測變更範圍，供後續 job 判斷是否需要執行
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '*.py'
              - 'requirements.txt'
              - 'Dockerfile'
              - 'db/**'
              - 'nginx/**'
              - 'certs/**'
            frontend:
              - 'frontend/**'

  build-and-deploy-backend:
    needs: detect-changes
    # 前端純前端改動時不重建後端，避免憑證被覆蓋
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restore certificate from secret
        run: |
          mkdir -p certs
          echo "${{ secrets.UNITRADE_CERT_PFX_BASE64 }}" | base64 -d > certs/unitrade_cert.pfx

      - name: Build and push Docker image via ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image trade-api:${{ github.sha }} \
            --image trade-api:latest \
            .

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/trade-api:${{ github.sha }}

  build-and-deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Angular app
        run: |
          cd frontend
          npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/dist/futures-dashboard"
          skip_app_build: true
